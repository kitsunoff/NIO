---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - nio.homystack.com
  resources:
  - machines
  - nixosconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nio.homystack.com
  resources:
  - machines/finalizers
  - nixosconfigurations/finalizers
  verbs:
  - update
- apiGroups:
  - nio.homystack.com
  resources:
  - machines/status
  - nixosconfigurations/status
  verbs:
  - get
  - patch
  - update
