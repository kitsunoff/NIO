---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: machines.nio.homystack.com
spec:
  group: nio.homystack.com
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    singular: machine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.host
      name: Host
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Discoverable")].status
      name: Discoverable
      type: string
    - jsonPath: .status.appliedConfiguration
      name: Config
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Machine is the Schema for the machines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of Machine.
            properties:
              host:
                description: Host is the target machine address (hostname or IP) for
                  SSH connection.
                maxLength: 253
                minLength: 1
                pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-\.\:]*[a-zA-Z0-9]$|^[a-zA-Z0-9]$
                type: string
              sshKeySecretRef:
                description: |-
                  SSHKeySecretRef references a Secret containing SSH private key.
                  The Secret must be in the same namespace as the Machine resource.
                properties:
                  name:
                    description: Name is the Secret name (must be in the same namespace
                      as the referencing resource).
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              sshPasswordSecretRef:
                description: |-
                  SSHPasswordSecretRef references a Secret containing SSH password.
                  The Secret must be in the same namespace as the Machine resource.
                properties:
                  key:
                    default: password
                    description: Key is the key in the Secret containing the password.
                    type: string
                  name:
                    description: Name is the Secret name (must be in the same namespace
                      as the Machine).
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              sshUser:
                default: root
                description: SSHUser is the SSH username for connection.
                maxLength: 32
                pattern: ^[a-zA-Z_][a-zA-Z0-9_\-]*$
                type: string
            required:
            - host
            type: object
          status:
            description: Status defines the observed state of Machine.
            properties:
              appliedCommit:
                description: AppliedCommit is the git commit hash of applied configuration.
                type: string
              appliedConfiguration:
                description: AppliedConfiguration is the name of applied NixosConfiguration.
                type: string
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              discoverable:
                description: Discoverable indicates if machine is reachable via SSH.
                type: boolean
              hardwareFacts:
                description: HardwareFacts contains collected hardware information.
                properties:
                  architecture:
                    description: Architecture is the system architecture (e.g., x86_64,
                      aarch64).
                    type: string
                  cpu:
                    description: CPU contains processor information.
                    properties:
                      cores:
                        description: Cores is the number of CPU cores.
                        type: string
                      model:
                        description: Model is the CPU model name.
                        type: string
                    type: object
                  disks:
                    additionalProperties:
                      type: string
                    description: Disks contains disk information (name -> size).
                    type: object
                  hostname:
                    description: Hostname is the system hostname.
                    type: string
                  interfaces:
                    additionalProperties:
                      type: string
                    description: Interfaces contains network interface information
                      (name -> IP).
                    type: object
                  kernel:
                    description: Kernel contains kernel information.
                    properties:
                      version:
                        description: Version is the kernel version.
                        type: string
                    type: object
                  memory:
                    description: Memory contains memory information in MB.
                    properties:
                      mb:
                        description: MB is the total memory in megabytes.
                        type: string
                    type: object
                  os:
                    description: OS contains operating system information.
                    properties:
                      id:
                        description: ID is the OS identifier (e.g., "nixos").
                        type: string
                      name:
                        description: Name is the OS name (e.g., "NixOS").
                        type: string
                    type: object
                  virtualization:
                    description: Virtualization contains virtualization type information.
                    properties:
                      containerEngine:
                        description: ContainerEngine is the container engine if running
                          in a container.
                        type: string
                      type:
                        description: Type is the virtualization type (physical, vm,
                          docker, etc.).
                        type: string
                    type: object
                type: object
              hasConfiguration:
                description: HasConfiguration indicates if a NixOS configuration is
                  applied.
                type: boolean
              lastAppliedTime:
                description: LastAppliedTime is the timestamp of last successful application.
                format: date-time
                type: string
              lastHardwareScanTime:
                description: LastHardwareScanTime is the timestamp of last hardware
                  scan.
                format: date-time
                type: string
              nixFacterResult:
                description: NixFacterResult contains nix facter command output.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
