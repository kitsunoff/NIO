---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nio.homystack.com
  resources:
  - machines
  - nixbuilders
  - nixdeployments
  - nixosconfigurations
  - nixstatefulsets
  - nixstores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nio.homystack.com
  resources:
  - machines/finalizers
  - nixbuilders/finalizers
  - nixdeployments/finalizers
  - nixosconfigurations/finalizers
  - nixstatefulsets/finalizers
  - nixstores/finalizers
  verbs:
  - update
- apiGroups:
  - nio.homystack.com
  resources:
  - machines/status
  - nixbuilders/status
  - nixdeployments/status
  - nixosconfigurations/status
  - nixstatefulsets/status
  - nixstores/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - source.toolkit.fluxcd.io
  resources:
  - buckets
  - gitrepositories
  - ocirepositories
  verbs:
  - get
  - list
  - watch
